<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Apology</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body id="page-letter">

    <canvas id="night-sky"></canvas>
    
    <audio id="bg-music" loop><source src="../music.mp3" type="audio/mpeg"></audio>

    <div class="page-container">
        <div class="glass-card fade-in-element">
            <h2 style="margin-bottom: 20px; color: var(--pink);">My Dearest,</h2>
            
            <!-- Edit the data-text attribute to change the apology message -->
            <div id="typewriter" class="typewriter-text" data-text="I know I messed up, and I am so incredibly sorry. You mean the world to me, and seeing you hurt is the last thing I ever wanted to do. I take full responsibility for my mistakes. Please let me show you how much you mean to me."></div>
            
            <div style="margin-top: 30px;">
                <a href="memories.html" class="btn-primary btn-transition">Continue ❤️</a>
            </div>
        </div>
    </div>

    <div class="music-player">
        <button id="play-btn">▶</button>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
    </div>

    <script src="../assets/particles.js"></script>
    <script src="../script.js"></script>
</body>
</html>
