<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="page-index">

    <canvas id="night-sky"></canvas>

    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="page-container">
        <div class="glass-card fade-in-element">
            <div class="hero-heart">❤️</div>
            <h1 style="margin-bottom: 10px;">I Made Something Just For You</h1>
            <p style="margin-bottom: 30px; color: var(--text-secondary);">Please give me just a few minutes of your time.</p>
            
            <!-- Link updated directly to letter.html -->
            <a href="letter.html" id="start-btn" class="btn-primary btn-transition">Open My Heart</a>
        </div>
    </div>

    <div class="music-player">
        <button id="play-btn">▶</button>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
    </div>

    <!-- Scripts updated directly to file names -->
    <script src="particles.js"></script>
    <script src="script.js"></script>
</body>
</html>
