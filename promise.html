<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Promises</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body id="page-promise">

    <canvas id="night-sky"></canvas>
    <audio id="bg-music" loop><source src="../music.mp3" type="audio/mpeg"></audio>

    <div class="page-container">
        <div class="glass-card fade-in-element">
            <h2 style="margin-bottom: 30px; color: var(--pink);">Moving Forward, I Promise:</h2>
            
            <div class="promise-list">
                <div class="promise-item"><span class="check-icon">✓</span> I will choose my words more carefully.</div>
                <div class="promise-item"><span class="check-icon">✓</span> I will always respect your feelings.</div>
                <div class="promise-item"><span class="check-icon">✓</span> I will communicate honestly and openly.</div>
                <div class="promise-item"><span class="check-icon">✓</span> I will never stop trying to make you smile.</div>
                <div class="promise-item"><span class="check-icon">✓</span> I will be the partner you deserve.</div>
            </div>
            
            <div style="margin-top: 20px;">
                <a href="forgive.html" class="btn-primary btn-transition">One Final Question...</a>
            </div>
        </div>
    </div>

    <div class="music-player">
        <button id="play-btn">▶</button>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
    </div>

    <script src="../assets/particles.js"></script>
    <script src="../script.js"></script>
</body>
</html>
